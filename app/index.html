        <h1>Ley N° 21.719: Regulación del Tratamiento y Protección de Datos Personales en Chile</h1>
        <p><strong>Vigencia:</strong> Publicada el 13 de diciembre de 2024. Vigencia plena desde el 1 de diciembre de 2026.</p>
        <p><strong>Autoridad:</strong> Agencia de Protección de Datos Personales (APDP)</p>

        <h2>Los 7 Principios Fundamentales</h2>
        <ol>
          <li><strong>Licitud y Lealtad:</strong> Los datos deben tratarse con apego a la ley y de manera justa.</li>
          <li><strong>Finalidad:</strong> Datos recolectados para fines específicos, explícitos y legítimos.</li>
          <li><strong>Proporcionalidad:</strong> Solo datos estrictamente necesarios para la finalidad declarada.</li>
          <li><strong>Calidad y Exactitud:</strong> Datos exactos, completos y actualizados.</li>
          <li><strong>Responsabilidad Proactiva:</strong> Capacidad de demostrar y acreditar el cumplimiento.</li>
          <li><strong>Seguridad:</strong> Medidas técnicas para resguardar confidencialidad, integridad y disponibilidad.</li>
          <li><strong>Transparencia:</strong> Información clara sobre quién trata los datos y cómo ejercer derechos.</li>
        </ol>

        <h2>Derechos ARCO-P</h2>
        <ul>
          <li><strong>A - Acceso:</strong> Derecho a saber si se tratan sus datos, con qué finalidad y destinatarios.</li>
          <li><strong>R - Rectificación:</strong> Corregir datos inexactos, desactualizados o incompletos.</li>
          <li><strong>C - Cancelación/Supresión:</strong> Eliminar datos cuando hayan dejado de ser necesarios.</li>
          <li><strong>O - Oposición:</strong> Oponerse al tratamiento por motivos fundados.</li>
          <li><strong>P - Portabilidad:</strong> Recibir datos en formato estructurado y transferirlos a otro responsable.</li>
        </ul>

        <h2>Régimen de Multas</h2>
        <ul>
          <li><strong>Leve:</strong> Amonestación o hasta 5.000 UTM</li>
          <li><strong>Grave:</strong> Hasta 10.000 UTM o 2% de ingresos anuales</li>
          <li><strong>Gravísima:</strong> Hasta 20.000 UTM o 4% de ingresos anuales</li>
          <li><strong>Reincidencia:</strong> Hasta 60.000 UTM o suspensión de tratamiento</li>
        </ul>

        <h2>Notificación de Brechas</h2>
        <p>Plazo máximo: <strong>72 horas</strong> desde el conocimiento de la brecha a la APDP.</p>
